---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: 0.86.0
      interval: 15m
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: vmetrics
    crds:
      enabled: false
    victoria-metrics-operator:
      enabled: false
    defaultDashboards:
      grafanaOperator:
        enabled: true
    alertmanager:
      enabled: false
    vmalert:
      enabled: true
      spec:
        # Only evaluate our own VMRule (recording rules). The chart's
        # defaultRules VMRules in this namespace are alerting rules with no
        # notifier configured, so we select explicitly by label instead of
        # using the chart default selectAllByDefault: true.
        selectAllByDefault: false
        ruleSelector:
          matchLabels:
            immich.app/vmrule: version-worker
        extraArgs:
          # No alertmanager is deployed; vmalert only runs recording rules.
          notifier.blackhole: "true"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
    grafana:
      enabled: false
    kubeEtcd:
      enabled: false
    vmsingle:
      spec:
        storage:
          resources:
            requests:
              storage: 100Gi
        extraArgs:
          search.logSlowQueryDuration: "3s"
        resources:
          requests:
            cpu: 2000m
            memory: 32Gi
          limits:
            memory: 32Gi
    vmagent:
      spec:
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 1Gi
