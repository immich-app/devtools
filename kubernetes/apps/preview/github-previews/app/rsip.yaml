apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: immich-github-prs
  namespace: preview
spec:
  type: GitHubPullRequest
  url: https://github.com/immich-app/immich
  filter:
    labels:
      - "preview"
---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: immich-github-branches
  namespace: preview
spec:
  type: GitHubBranch
  url: https://github.com/immich-app/immich
  filter:
    includeBranch: "^main$"
---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: immich-github-tags
  namespace: preview
spec:
  type: GitHubTag
  url: https://github.com/immich-app/immich
  filter:
    semver: ">=2.0.0"
    limit: 10
