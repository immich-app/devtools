apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: outline-dev-db
  namespace: outline-dev
spec:
  # Must match the prod major version; a physical restore can't cross majors.
  imageName: ghcr.io/cloudnative-pg/postgresql:17.0
  storage:
    size: 10Gi
    storageClass: zfs
  bootstrap:
    recovery:
      source: outline-db
  externalClusters:
    - name: outline-db
      barmanObjectStore:
        serverName: outline-db
        destinationPath: s3://${bucket_name}
        endpointURL: ${api_endpoint}
        wal:
          compression: bzip2
        s3Credentials:
          accessKeyId:
            name: outline-database-backup-secret
            key: id
          secretAccessKey:
            name: outline-database-backup-secret
            key: secret
