apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: outline-secret-keys
  namespace: outline-dev
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1p-tf
  refreshInterval: "20s"
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: OUTLINE_SECRET_KEY
    - secretKey: UTILS_SECRET
      remoteRef:
        key: OUTLINE_UTILS_SECRET
