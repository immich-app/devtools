---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: outline-role-sync
  namespace: tools
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      labels:
        podbump.bo0tzz.me/enabled: 'true'
    controllers:
      outline-role-sync:
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/outline-role-sync
              tag: release
            env:
              OUTLINE_BASE_URL: "https://outline.immich.cloud"
              ZITADEL_BASE_URL: "https://zitadel.internal.immich.cloud"
              PORT: "8080"
            envFrom:
              - secretRef:
                  name: outline-role-sync
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  periodSeconds: 10
    service:
      app:
        controller: outline-role-sync
        ports:
          http:
            port: 8080
