[tools]
deno = "2.8.3"
flux2 = "2.8.8"
go = "1.26.4"
"go:github.com/cloudnative-pg/cloudnative-pg/cmd/kubectl-cnpg" = "1.29.1"
"go:github.com/home-operations/flate/cmd/flate" = "0.4.10"
helm = "4.2.2"
jq = "1.8.1"
kubectl = "1.36.2"
opentofu = "1.11.8"
terragrunt = "1.0.4"
usage = "3.5.2"
uv = "0.11.21"
yamlfmt = "0.21.0"

[env]
KUBECONFIG = "{{config_root}}/.mise/kube.config"
# Pin op CLI resolution to the immich account so `op run`/`op inject` aren't
# ambiguous when other 1Password accounts are also signed in. All op:// refs in
# this repo live in the immich account; the FUTO account is reached via service
# tokens at the provider level, not the op CLI.
OP_ACCOUNT = "immich.1password.com"

[tasks.tg]
run = "op run '--env-file={{config_root}}/tf/deployment/.env' -- env -u OP_CONNECT_HOST -u OP_CONNECT_TOKEN -u OP_SERVICE_ACCOUNT_TOKEN -u OP_ACCOUNT -- terragrunt"
description = "Wrapper for terragrunt, op run resolves secrets then env -u strips op auth vars so they don't conflict with terraform providers"
dir = "{{cwd}}"

[tasks."tg:fmt"]
run = "mise run tg hcl format"
description = "Format terragrunt files"

[tasks.tf]
run = "mise run tg run --all"
description = "Wrapper for terragrunt run-all"
dir = "{{cwd}}"

[tasks."tf:fmt"]
run = "tofu fmt -recursive tf/"
description = "Format terraform files"

[tasks."tf:init"]
run = "mise run tf init -- -reconfigure"
dir = "{{cwd}}"

[tasks."tf:plan"]
run = "mise run tf plan"
dir = "{{cwd}}"

[tasks."tf:apply"]
run = "mise run tf apply"
dir = "{{cwd}}"

[tasks."kube:fmt"]
run = "yamlfmt kubernetes/ templates/kubernetes/"
description = "Format kubernetes manifests"

[tasks."kube:auth"]
run = "op inject -i .mise/kube-exec-credential.json | jq '.status.[] |= @base64d'"
description = "Retrieve kubectl auth key"
hide = true

[tasks."kube:diff"]
run = "flate diff hr --path ./kubernetes --base main --allow-missing-secrets"
description = "Diff kubernetes helm releases"

[tasks.fmt]
depends = ["*:fmt"]
description = "Format all files"

[settings]
experimental = true
lockfile = true
