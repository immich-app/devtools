name: ZITADEL Actions Worker

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  pre-job:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check what should run
        id: check
        uses: immich-app/devtools/actions/pre-job@91f342bb4477c4bc10c576ae739da875d85aa164 # pre-job-action-v2.0.4
        with:
          github-token: ${{ github.token }}
          filters: |
            worker:
              - 'services/zitadel-actions/**'
          force-filters: |
            - '.github/workflows/zitadel-actions.yml'

  check:
    name: Check & Test
    needs: pre-job
    if: ${{ fromJSON(needs.pre-job.outputs.should_run).worker == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./services/zitadel-actions
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: "2.8.3" # keep in sync with .mise/config.toml

      - name: Format
        run: deno task fmt
        if: ${{ !cancelled() }}

      - name: Lint
        run: deno task lint
        if: ${{ !cancelled() }}

      - name: Type check
        run: deno task check
        if: ${{ !cancelled() }}

      - name: Test
        run: deno task test
        if: ${{ !cancelled() }}

      - name: Build (transpile)
        run: deno task build > /dev/null
        if: ${{ !cancelled() }}
